<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tony Blackberry Industries</title>
    <style>
      body {
        #screen {
          border: 10px solid #ccc;
          image-rendering: pixelated;
          image-rendering: crisp-edges;
          image-rendering: -moz-crisp-edges;
          width: 400px;
          height: 400px; /*basicamente isso aqui é para ajustar o tamanho d
          canvas e dos elementos dentro dele. O canvas tem 480x480, mas isso é por conta do
          fato de cada player/energy ter 48 pixels*/
        }
      }
    </style>
  </head>
  <body>
    <canvas id="screen" width="480" height="480"></canvas>
    <script>
      //camada de apresentação do jogo, onde o canvas é desenhado e os elementos são renderizados
      const screen = document.getElementById("screen");
      const context = screen.getContext("2d");

      const imgApple = new Image();
      imgApple.src = "energy_pixel.png";

      quadSize = 48; //Uso para definir o tamanho do energy e dos players

      context.scale(quadSize, quadSize); //aqui é para ajustar a escala do canvas, para que os elementos sejam desenhados no tamanho correto

      function createGame() {
        //JOGO LAYER

        const state = {
          players: {},
          energy: {},
        };

        function addPlayers(command) {
          const playerID = command.playerID;
          const playerX = command.playerX;
          const playerY = command.playerY;

          state.players[playerID] = {
            x: playerX,
            y: playerY,
          };
        }

        function removePlayers(command) {
          const playerID = command.playerID;

          delete state.players[playerID];
        }

        function addEnergy(command) {
          const energyID = command.energyID;
          const energyX = command.energyX;
          const energyY = command.energyY;

          state.energy[energyID] = {
            x: energyX,
            y: energyY,
          };
        }

        function removeEnergy(command) {
          const energyID = command.energyID;

          delete state.energy[energyID];
        }

        function movePlayer(command) {
          console.log(`Moving ${command.playerID} with ${command.keyPressed}`);

          const acepptedMoves = {
            ArrowUp(player) {
              console.log("Moving player Up");
              player.y = Math.max(player.y - 1, 0);
            },
            ArrowRight(player) {
              console.log("Moving player Right");
              player.x = Math.min(player.x + 1, 9);
            },
            ArrowDown(player) {
              console.log("Moving player Down");
              player.y = Math.min(player.y + 1, 9);
            },
            ArrowLeft(player) {
              console.log("Moving player Left");
              player.x = Math.max(player.x - 1, 0);
            },
          };

          const keyPressed = command.keyPressed;
          const player = state.players[command.playerID];
          const moveFunction = acepptedMoves[keyPressed];

          if (player && moveFunction) {
            moveFunction(player);
          }
        }
        return {
          addPlayers,
          removePlayers,
          addEnergy,
          removeEnergy,
          movePlayer,
          state,
        };
      }

      const game = createGame();
      const keyboardListener = createKeyboardListener(); //INPUT LAYER
      keyboardListener.subscribe(game.movePlayer);

      function createKeyboardListener() {
        //meu subscriber, onde os observers se inscrevem para receber as notificações de eventos de teclado. Ele tem uma função subscribe para adicionar os observers e uma função notifyAll para notificar todos os observers quando um evento de teclado ocorre.
        const state = {
          observes: [],
        };

        function subscribe(observerFunction) {
          state.observes.push(observerFunction);
        }

        function notifyAll(command) {
          console.log(`Notifying ${state.observes.length} observers`);

          for (const observerFunction of state.observes) {
            observerFunction(command);
          }
        }

        document.addEventListener("keydown", handleKeydown);

        function handleKeydown(event) {
          //input layer
          const keyPressed = event.key;

          const command = {
            playerID: "player1",
            keyPressed,
          };

          notifyAll(command);
        }
        return {
          subscribe,
        };
      }

      imgApple.onload = () => {
        //loading layer
        renderScreen(); //aqui é para garantir que a imagem seja carregada antes de
        // tentar desenhá-la no canvas, evitando erros de renderização
      };

      function renderScreen() {
        //GAME SHOW LAYER
        //apresentation layer
        context.fillStyle = "white";
        context.clearRect(0, 0, 10, 10); //da o clean do tamanho do canvas, para evitar que os elementos anteriores fiquem na tela

        for (const playerID in game.state.players) {
          const player = game.state.players[playerID];
          context.fillStyle = "green";
          context.fillRect(player.x, player.y, 1, 1);
        }
        for (const energyID in game.state.energy) {
          const energy = game.state.energy[energyID];
          context.drawImage(imgApple, energy.x, energy.y, 1, 1);
        }
        requestAnimationFrame(renderScreen);
      }
    </script>
  </body>
</html>
