<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tony Blackberry Industries</title>
    <style>
      body {
        #screen {
          border: 10px solid #ccc;
          image-rendering: pixelated;
          image-rendering: crisp-edges;
          image-rendering: -moz-crisp-edges;
          width: 400px;
          height: 400px; /*basicamente isso aqui é para ajustar o tamanho d
          canvas e dos elementos dentro dele. O canvas tem 480x480, mas isso é por conta do
          fato de cada player/energy ter 48 pixels*/
        }
      }
    </style>
  </head>
  <body>
    <canvas id="screen" width="480" height="480"></canvas>
    <script type="module">
      import createKeyboardListener from "./input_layer.js";
      import createGame from "./game_layer.js";
      import renderScreen from "./apresentation_layer.js";

      //camada de apresentação do jogo, onde o canvas é desenhado e os elementos são renderizados
      const screen = document.getElementById("screen");
      const context = screen.getContext("2d");

      const imgApple = new Image();
      imgApple.src = "energy_pixel.png";

      const quadSize = 48; //Uso para definir o tamanho do energy e dos players

      context.scale(quadSize, quadSize); //aqui é para ajustar a escala do canvas, para que os elementos sejam desenhados no tamanho correto

      const game = createGame();
      const keyboardListener = createKeyboardListener(document); //INPUT LAYER
      keyboardListener.subscribe(game.movePlayer);

      game.addPlayers({ playerID: "player1", playerX: 1, playerY: 1 });
      game.addPlayers({ playerID: "player1", playerX: 3, playerY: 4 });
      game.addPlayers({ playerID: "player2", playerX: 2, playerY: 6 });
      game.addEnergy({ energyID: "energy2", energyX: 5, energyY: 9 });
      game.addEnergy({ energyID: "energy1", energyX: 2, energyY: 2 });

      imgApple.onload = () => {
        //loading layer
        renderScreen(game, requestAnimationFrame, screen, imgApple); //aqui é para garantir que a imagem seja carregada antes de
        // tentar desenhá-la no canvas, evitando erros de renderização
      };
    </script>
  </body>
</html>
