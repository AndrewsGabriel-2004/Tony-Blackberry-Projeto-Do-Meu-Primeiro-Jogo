<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tony Blackberry Industries</title>
    <style>
      body {
        #screen {
          border: 10px solid #ccc;
          image-rendering: pixelated;
          image-rendering: crisp-edges;
          image-rendering: -moz-crisp-edges;
          width: 400px;
          height: 400px; /*basicamente isso aqui é para ajustar o tamanho d
          canvas e dos elementos dentro dele. O canvas tem 480x480, mas isso é por conta do
          fato de cada player/energy ter 48 pixels*/
        }
      }
    </style>
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body>
    <canvas id="screen" width="480" height="480"></canvas>
    <script type="module">
      import createKeyboardListener from "./input_layer.js";
      import createGame from "./game_layer.js";
      import renderScreen from "./apresentation_layer.js";

      const quadSize = 48; //Uso para definir o tamanho do energy e dos players
      const canvas = document.getElementById("screen");
      const context = canvas.getContext("2d");

      context.scale(quadSize, quadSize); //aqui é para ajustar a escala do canvas, para que os elementos sejam desenhados no tamanho correto

      const game = createGame();
      const keyboardListener = createKeyboardListener(document); //INPUT LAYER

      const socket = io();

      socket.on("connect", () => {
        const playerID = socket.id;
        console.log(`Player connected on Client with ID: ${playerID}`);

        const screen = document.getElementById("screen");
        const imgApple = new Image();

        imgApple.onload = () => {
          renderScreen(game, requestAnimationFrame, screen, imgApple, playerID); //aqui é para garantir que a imagem seja carregada antes de
        };

        imgApple.src = "energy_pixel.png";
      });

      socket.on("add-players", (command) => {
        console.log(`Player added on Client with ID: ${command.playerID}`);
        game.addPlayers(command);
      });

      socket.on("remove-players", (command) => {
        console.log(`Player removed on Client with ID: ${command.playerID}`);
        game.removePlayers(command);
      });

      socket.on("setup", (state) => {
        const playerID = socket.id;
        game.setState(state);
        keyboardListener.registerPlayerID(playerID); //aqui é para registrar o playerID no input layer, para que os comandos de teclado sejam associados ao player correto
        keyboardListener.subscribe(game.movePlayer);
        keyboardListener.subscribe((command) => {
          socket.emit("move-player", command);
        });
      });

      socket.on("move-player", (command) => {
        const playerID = socket.id;

        if (command.playerID !== playerID) {
          game.movePlayer(command);
        }
      });

      socket.on("add-energy", (command) => {
        console.log(`Energy added on Client with ID: ${command.energyID}`);
        game.addEnergy(command);
      });

      socket.on("remove-energy", (command) => {
        console.log(`Energy removed on Client with ID: ${command.energyID}`);
        game.removeEnergy(command);
      });
    </script>
  </body>
</html>
