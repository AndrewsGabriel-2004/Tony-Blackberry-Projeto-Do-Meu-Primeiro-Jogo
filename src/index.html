<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tony Blackberry Industries</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #020b18;
        background-image:
          linear-gradient(rgba(0, 200, 255, 0.15) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 200, 255, 0.15) 1px, transparent 1px);
        background-size: 40px 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Segoe UI", sans-serif;
      }

      #game-container {
        display: flex;
        gap: 20px;
        align-items: flex-start;
      }

      #screen {
        border: 3px solid #e94560;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        image-rendering: -moz-crisp-edges;
        width: 700px;
        height: 700px;
        box-shadow: 0 0 30px rgba(233, 69, 96, 0.4);
        display: block;
      }

      #scoreboard {
        width: 240px;
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      #scoreboard-header {
        background: #0f3460;
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #e94560;
        font-weight: bold;
        font-size: 15px;
      }

      .player-count {
        color: #a0a0b0;
        font-size: 11px;
        font-weight: normal;
      }

      #score-list {
        list-style: none;
        padding: 8px 0;
        max-height: 500px;
        overflow-y: auto;
      }

      #score-list li {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 16px;
        border-bottom: 1px solid #0f3460;
        transition: background 0.2s;
      }

      #score-list li:last-child {
        border-bottom: none;
      }

      #score-list li.me {
        background: rgba(233, 69, 96, 0.15);
      }

      .rank {
        font-size: 11px;
        color: #a0a0b0;
        width: 18px;
        text-align: center;
        flex-shrink: 0;
      }

      .rank.gold {
        color: #ffd700;
        font-weight: bold;
        font-size: 14px;
      }
      .rank.silver {
        color: #c0c0c0;
        font-weight: bold;
        font-size: 14px;
      }
      .rank.bronze {
        color: #cd7f32;
        font-weight: bold;
        font-size: 14px;
      }

      .player-dot {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      .player-name {
        flex: 1;
        font-size: 11px;
        color: #e0e0f0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player-score {
        font-size: 14px;
        font-weight: bold;
        color: #e94560;
        min-width: 20px;
        text-align: right;
      }
    </style>
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body>
    <div id="game-container">
      <canvas id="screen" width="480" height="480"></canvas>

      <div id="scoreboard">
        <div id="scoreboard-header">
          <span>🏆 Placar</span>
          <span class="player-count" id="player-count">0 jogadores</span>
        </div>
        <ol id="score-list"></ol>
      </div>
    </div>

    <script type="module">
      import createKeyboardListener from "./input_layer.js";
      import createGame from "./game_layer.js";
      import renderScreen from "./apresentation_layer.js";

      const quadSize = 32;
      const canvas = document.getElementById("screen");
      const context = canvas.getContext("2d");

      context.scale(quadSize, quadSize);

      const game = createGame();
      const keyboardListener = createKeyboardListener(document);

      const socket = io();

      socket.on("connect", () => {
        const playerID = socket.id;
        console.log(`Player connected on Client with ID: ${playerID}`);

        const imgApple = new Image();
        imgApple.onload = () => {
          renderScreen(game, requestAnimationFrame, canvas, imgApple, playerID);
        };
        imgApple.src = "energy_pixel.png";
      });

      function updateScoreboard() {
        const playerID = socket.id;
        const players = game.state.players;
        const sorted = Object.entries(players).sort(
          (a, b) => (b[1].score ?? 0) - (a[1].score ?? 0),
        );

        document.getElementById("player-count").textContent =
          `${sorted.length} jogador${sorted.length !== 1 ? "es" : ""}`;

        const list = document.getElementById("score-list");
        list.innerHTML = "";

        const medals = ["🥇", "🥈", "🥉"];

        sorted.forEach(([id, player], index) => {
          const li = document.createElement("li");
          if (id === playerID) li.classList.add("me");

          const rankClass =
            index < 3 ? ["gold", "silver", "bronze"][index] : "";
          const rankText = index < 3 ? medals[index] : `${index + 1}`;

          li.innerHTML = `
            <span class="rank ${rankClass}">${rankText}</span>
            <span class="player-dot" style="background:${id === playerID ? "#e94560" : "#4caf50"}"></span>
            <span class="player-name">${id.substring(0, 8)}...</span>
            <span class="player-score">${player.score ?? 0}</span>
          `;
          list.appendChild(li);
        });
      }

      socket.on("setup", (state) => {
        const playerID = socket.id;
        game.setState(state);

        const gridSize = state.gridSize || 10;
        canvas.width = gridSize * quadSize;
        canvas.height = gridSize * quadSize;
        context.setTransform(quadSize, 0, 0, quadSize, 0, 0);

        keyboardListener.registerPlayerID(playerID);
        keyboardListener.subscribe(game.movePlayer);
        keyboardListener.subscribe((command) => {
          socket.emit("move-player", command);
        });

        updateScoreboard();
      });

      socket.on("add-players", (command) => {
        game.addPlayers(command);
        updateScoreboard();
      });

      socket.on("remove-players", (command) => {
        game.removePlayers(command);
        updateScoreboard();
      });

      socket.on("move-player", (command) => {
        if (command.playerID !== socket.id) {
          game.movePlayer(command);
        }
      });

      socket.on("add-energy", (command) => {
        game.addEnergy(command);
      });

      socket.on("remove-energy", (command) => {
        game.removeEnergy(command);
      });

      socket.on("score-update", (command) => {
        const player = game.state.players[command.playerID];
        if (player) {
          player.score = command.score;
        }
        updateScoreboard();
      });
    </script>
  </body>
</html>
